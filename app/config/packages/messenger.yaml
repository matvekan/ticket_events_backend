framework:
    messenger:
        default_bus: command.bus

        buses:
            command.bus: ~
            query.bus: ~
            event.bus:
                default_middleware: allow_no_handlers

        transports:
            sync: 'sync://'

        routing:
            'App\Domain\Event\SeatsReservedEvent': sync
            'App\Domain\Event\OrderPaidEvent': sync
            'App\Domain\Event\OrderCancelledEvent': sync
            'App\Domain\Event\OrderRefundedEvent': sync
            'App\Domain\Event\EventCreatedEvent': sync
            'App\Domain\Event\EventStatusChangedEvent': sync
